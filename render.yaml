services:
  - type: web
    name: caregiver-handoff-memory
    runtime: docker
    plan: free
    healthCheckPath: /healthz
    envVars:
      - key: MEMORY_BACKEND
        value: cognee
      - key: COGNEE_BASE_URL
        sync: false
      - key: COGNEE_API_KEY
        sync: false
      - key: COGNEE_TENANT_ID
        sync: false
      - key: COGNEE_STRICT
        value: "true"
      - key: COGNEE_DATASET_PREFIX
        value: handoff-live-demo
      - key: COGNEE_ALLOW_LOCAL_RANK_FALLBACK
        value: "false"
      - key: COGNEE_FAST_DEMO_RECALL
        value: "true"
      - key: COGNEE_TIMEOUT_SECONDS
        value: "120"
      - key: COGNEE_MAX_RETRIES
        value: "2"
      - key: LLM_PROVIDER
        value: gemini
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-flash-lite-latest
      - key: LLM_STRICT
        value: "true"
      - key: APP_ENV
        value: demo
      - key: DEMO_SYNTHETIC_DATA_ONLY
        value: "true"
      - key: DEMO_RATE_LIMIT_WINDOW_SECONDS
        value: "600"
      - key: DEMO_RATE_LIMIT_API_REQUESTS
        value: "240"
      - key: DEMO_RATE_LIMIT_MUTATION_REQUESTS
        value: "60"
      - key: JWT_SECRET
        generateValue: true
